<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Journée HA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="static/style.css?v=1.4.1">
</head>

<body>
  <main class="app">
    <header class="header">
      <div>
        <h1>Journée HA</h1>
        <p>Calculadora semanal de horários para Home Assistant</p>
      </div>

      <div class="header-actions">
        <button id="saveBtn" type="button">Salvar</button>
        <button id="reportBtn" type="button" class="primary">Gerar relatório</button>
      </div>
    </header>

    <section class="card compact-card">
      <h2>Configurações do relatório</h2>

      <div class="grid settings-grid">
        <label>
          Período
          
          <div class="period-input-row">
            <input id="reportPeriod" type="text" placeholder="24/07/2026">
        
            <button id="nextFridayBtn" type="button" class="secondary">
              Próxima sexta-feira
            </button>
          </div>
        </label>

        <label class="checkbox">
          <input id="randomize" type="checkbox">
          <span>Usar variações aleatórias</span>
        </label>
      </div>
    </section>

    <section class="tabs" id="dayTabs"></section>

    <section class="card">
      <div class="day-header">
        <div>
          <h2 id="dayTitle">Dia</h2>
          <p class="subtle">Cadastre os locais na ordem do percurso.</p>
        </div>

        <div class="day-time-grid">
          <label>
            Início
            <input id="startTime" type="time">
          </label>

          <label>
            Variação início, min
            <input id="startVariation" type="number" min="0" step="1">
          </label>
        </div>
      </div>

      <div id="locationsBody" class="locations-list"></div>

      <div class="row-actions">
        <button id="addLocationBtn" type="button" class="add-location">
          + Adicionar local
        </button>
      </div>
    </section>

    <section class="card">
      <h2>Relatório semanal</h2>

      <div class="email-row">
        <label>
          Assunto do email
          <input id="emailSubject" type="text">
        </label>

        <label>
          Destinatários
          <input id="emailRecipients" type="text" placeholder="email1@exemplo.com, email2@exemplo.com">
        </label>
      </div>

      <textarea id="reportText" spellcheck="false"></textarea>

      <div class="row-actions">
        <button id="copyBtn" type="button">Copiar relatório</button>
        <button id="emailBtn" type="button">Enviar por email</button>
      </div>

      <p class="hint">
        Para email funcionar, configure SMTP nas opções do add-on no Home Assistant.
      </p>
    </section>

    <section class="card">
      <h2>Backup</h2>

      <div class="backup-row">
        <input id="backupName" type="text" placeholder="nome_do_backup">
        <button id="backupBtn" type="button">Criar backup</button>
        <select id="backupList"></select>
        <button id="restoreBtn" type="button">Restaurar</button>
      </div>
    </section>

    <div id="toast"></div>

  </main>

  <script src="static/app.js?v=1.4.1"></script>
</body>
</html>
